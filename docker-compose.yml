services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
      
  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend

  admin:
    build: ./admin
    ports:
      - "5000:5173"
    depends_on:
      - backend